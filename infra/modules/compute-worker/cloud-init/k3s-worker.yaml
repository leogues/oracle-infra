#cloud-config

package_update: true

write_files:
  - path: /var/lib/cloud/scripts/per-once/install-k3s-agent.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec > >(tee -a /var/log/k3s-bootstrap.log) 2>&1

      iptables -P INPUT ACCEPT
      iptables -F INPUT
      ip6tables -P INPUT ACCEPT
      ip6tables -F INPUT
      netfilter-persistent save

      until curl -k --silent --output /dev/null --connect-timeout 5 ${server_url}/ping; do
        echo "waiting for k3s server at ${server_url}"
        sleep 10
      done

      INSTANCE_OCID=$(curl -sfH "Authorization: Bearer Oracle" http://169.254.169.254/opc/v2/instance/id)

      curl -sfL https://get.k3s.io | \
        INSTALL_K3S_EXEC="agent --kubelet-arg=cloud-provider=external --kubelet-arg=provider-id=oci://$INSTANCE_OCID" \
        K3S_URL='${server_url}' \
        K3S_TOKEN='${k3s_token}' \
        sh -

      echo "agent bootstrap done $(date)"
